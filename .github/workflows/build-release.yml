name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows .exe ────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Version in __init__.py eintragen
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content src/__init__.py) -replace '__version__ = ".*"', "__version__ = `"$version`"" |
            Set-Content src/__init__.py

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: EXE bauen
        run: python -m PyInstaller scrat_backup.spec --clean --noconfirm

      - name: Installer bauen (Inno Setup)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          iscc "/DMyAppVersion=$version" installer.iss
          $setupName = "ScratBackup-${{ github.ref_name }}-Setup.exe"
          Move-Item "output\ScratBackup-v${version}-Setup.exe" $setupName
          echo "SETUP_NAME=$setupName" >> $env:GITHUB_ENV

      - name: Zum Release hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SETUP_NAME }}

  # ── Linux AppImage ──────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Version in __init__.py eintragen
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          sed -i "s/__version__ = \".*\"/__version__ = \"$version\"/" src/__init__.py

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: System-Abhängigkeiten installieren
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 \
            libglib2.0-0 libdbus-1-3 squashfs-tools

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: AppImage-Tool herunterladen
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: App bauen
        run: python -m PyInstaller scrat_backup.spec --clean --noconfirm

      - name: AppDir erstellen
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/ScratBackup/* AppDir/usr/bin/
          cp assets/icons/scrat-256.png AppDir/scrat-backup.png
          cp assets/icons/scrat-256.png AppDir/usr/share/icons/hicolor/256x256/apps/scrat-backup.png

          cat > AppDir/scrat-backup.desktop << 'EOF'
          [Desktop Entry]
          Name=Scrat-Backup
          Comment=Verschlüsseltes plattformübergreifendes Backup-Tool
          Exec=ScratBackup
          Icon=scrat-backup
          Type=Application
          Categories=Utility;Archiving;
          StartupWMClass=ScratBackup
          EOF

          cp AppDir/scrat-backup.desktop AppDir/usr/share/applications/

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export QT_PLUGIN_PATH="${HERE}/usr/bin/_internal/PySide6/Qt/plugins"
          # AT-SPI: nur deaktivieren wenn kein Daemon läuft (GNOME/KDE haben ihn,
          # XFCE/Void/CachyOS meist nicht → Segfault bei Tastatureingabe ohne Daemon)
          if ! dbus-send --session --print-reply --dest=org.freedesktop.DBus \
              /org/freedesktop/DBus org.freedesktop.DBus.NameHasOwner \
              string:org.a11y.Bus 2>/dev/null | grep -q "boolean true"; then
            export NO_AT_BRIDGE=1
          fi
          # IM-Fix: kein ibus/fcitx-Daemon auf minimalen Desktops
          # CJK-Nutzer: QT_IM_MODULE=ibus ./App.AppImage
          if [ -z "$QT_IM_MODULE" ]; then
            export QT_IM_MODULE=none
            unset XMODIFIERS
          fi
          exec "${HERE}/usr/bin/ScratBackup" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: AppImage erstellen
        run: |
          version="${{ github.ref_name }}"
          appimage_name="ScratBackup-${version}-x86_64.AppImage"
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run AppDir "$appimage_name"
          cp "$appimage_name" ScratBackup-x86_64.AppImage
          echo "APPIMAGE_NAME=$appimage_name" >> $GITHUB_ENV

      - name: Zum Release hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APPIMAGE_NAME }}
            ScratBackup-x86_64.AppImage
            install.sh
